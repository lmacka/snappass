[tox]
envlist = py310, py311, py312, flake8

[testenv]
setenv =
    MOCK_REDIS = 1
commands =
    pip install -r requirements.txt
    pip install -r dev-requirements.txt
    pytest --cov=snappass --cov-report=term-missing tests.py

[testenv:flake8]
commands =
   pip install -r dev-requirements.txt
   flake8

[gh-actions]
python =
    3.10: py310, flake8
    3.11: py311
    3.12: py312
